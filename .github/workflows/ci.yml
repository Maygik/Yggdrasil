name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Show SDK info
        shell: pwsh
        run: dotnet --info

      - name: Build solution
        shell: pwsh
        run: dotnet build Yggdrasil.sln -c Release -nologo -v minimal

      - name: Publish portable desktop build
        shell: pwsh
        run: ./scripts/Publish-Desktop.ps1 -Configuration Release -Runtime win-x64 -OutputDir ./artifacts/ci
